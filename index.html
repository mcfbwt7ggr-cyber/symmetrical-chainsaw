<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>社会AI先生</title>

<style>

body{
font-family:sans-serif;
background:#eef6ff;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

#teacher{
width:170px;
margin:auto;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

#chat{
background:white;
border-radius:15px;
padding:20px;
margin:20px auto;
max-width:500px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

textarea{
width:90%;
height:120px;
font-size:16px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
margin-top:10px;
}

</style>

</head>

<body>

<h1>社会AI先生</h1>

<svg id="teacher" viewBox="0 0 200 200">

<circle cx="100" cy="60" r="40" fill="#ffd9b3"/>
<circle cx="85" cy="55" r="5"/>
<circle cx="115" cy="55" r="5"/>
<path d="M85 75 Q100 85 115 75" stroke="black" fill="none"/>
<rect x="60" y="100" width="80" height="70" fill="#5fa8d3"/>

</svg>

<div id="chat">

① 下に質問を書きます  
② 「質問を作る」を押します  
③ ChatGPTに貼り付けます

</div>

<br>

<input id="q" placeholder="社会科の質問を書いてね">

<br>

<button onclick="makeQuestion()">質問を作る</button>

<br><br>

<textarea id="result" placeholder="ここに質問文が作られます"></textarea>

<script>

function makeQuestion(){

let q=document.getElementById("q").value

if(q===""){
alert("質問を書いてください")
return
}

let text=
"あなたは小学校5・6年生の社会科の先生です。\n"+
"小学生でも分かる言葉で説明してください。\n"+
"質問："+q

document.getElementById("result").value=text

}

</script>

</body>

</html>
