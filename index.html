<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>社会AI先生</title>

<style>

body{
font-family:sans-serif;
background:#eef6ff;
text-align:center;
padding:20px;
}

h1{
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:20px;
}

#teacher{
width:170px;
margin:auto;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

#chat{
background:white;
border-radius:15px;
padding:20px;
height:200px;
margin:20px auto;
max-width:500px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

input{
width:65%;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
margin-left:10px;
}

button:active{
background:#2b7bd6;
}

.examples{
margin-top:20px;
font-size:14px;
color:#555;
line-height:1.7;
}

</style>

</head>

<body>

<h1>社会AI先生</h1>

<div class="subtitle">
5・6年社会の質問をしてみよう
</div>

<svg id="teacher" viewBox="0 0 200 200">

<circle cx="100" cy="60" r="40" fill="#ffd9b3"/>
<circle cx="85" cy="55" r="5"/>
<circle cx="115" cy="55" r="5"/>
<path d="M85 75 Q100 85 115 75" stroke="black" fill="none"/>
<rect x="60" y="100" width="80" height="70" fill="#5fa8d3"/>

</svg>

<div id="chat">

こんにちは。  
社会科の質問をしてね。

</div>

<br>

<input id="q" placeholder="社会科の質問を書いてね">

<button onclick="ask()">質問</button>

<div class="examples">

例

<br><br>

🌾 地理  
米づくりはどこで多い？  
日本の気候の特色は？

<br><br>

🏭 産業  
日本の三大工業地帯は？  
自動車工業が盛んな理由は？

<br><br>

⏳ 歴史  
聖徳太子は何をした人？  
鎌倉幕府はなぜできた？

<br><br>

🏛 公民  
日本の選挙のしくみは？  
税金は何に使われている？

</div>

<script>

function ask(){

let q=document.getElementById("q").value

if(q===""){
alert("質問を書いてください")
return
}

let prompt=
"あなたは小学校5年生と6年生の社会科の先生です。\n"+
"小学生でも分かる言葉で説明してください。\n"+
"できるだけ簡単に説明してください。\n"+
"質問："+q

navigator.clipboard.writeText(prompt)

window.open("https://chat.openai.com","_blank")

alert("質問をコピーしました。ChatGPTで貼り付けて送信してください。")

}

</script>

</body>

</html>
