<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>社会科AI先生</title>

<style>

body{
font-family:sans-serif;
background:#eef6ff;
text-align:center;
padding:20px;
}

h1{
margin-bottom:20px;
}

#teacher{
width:170px;
margin:auto;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

#chat{
background:white;
border-radius:15px;
padding:20px;
height:200px;
margin:20px auto;
max-width:500px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
overflow:auto;
}

input{
width:60%;
padding:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
font-size:16px;
border:none;
border-radius:8px;
background:#4da3ff;
color:white;
margin-left:10px;
}

button:active{
background:#2b7bd6;
}

</style>

</head>

<body>

<h1>5年社会AI先生</h1>

<!-- キャラクター -->

<svg id="teacher" viewBox="0 0 200 200">

<circle cx="100" cy="60" r="40" fill="#ffd9b3"/>

<circle cx="85" cy="55" r="5"/>
<circle cx="115" cy="55" r="5"/>

<path d="M85 75 Q100 85 115 75" stroke="black" fill="none"/>

<rect x="60" y="100" width="80" height="70" fill="#5fa8d3"/>

</svg>

<div id="chat">
こんにちは。社会科の質問をしてね。
</div>

<br>

<input id="q" placeholder="社会科の質問を書いてね">

<button onclick="ask()">質問</button>

<script>

function ask(){

let q = document.getElementById("q").value

if(q===""){
alert("質問を書いてね")
return
}

let prompt =
"あなたは小学校5・6年生の社会科の先生です。" +
"小学生でも分かる言葉で説明してください。" +
"質問：" + q

let url =
"https://chat.openai.com/?q=" +
encodeURIComponent(prompt)

window.open(url,"_blank")

}

</script>

</body>
</html>
